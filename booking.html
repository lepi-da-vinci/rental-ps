<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="index.html">🎮 GameZone</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="menu">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>

        </ul>
      </div>

  <!-- SECTION BOOKING & KONTAK -->
  <section id="booking" class="py-5">
    <div class="container">

      <p class="judul-section">Booking & Kontak</p>
      <div class="garis-bawah"></div>

      <div class="row g-4 justify-content-center">

        <!-- Form Booking -->
        <div class="col-md-5">
          <div class="kartu-konsol">
            <h5 class="mb-3" style="color: var(--warna-aksen);"><i class="fa-solid fa-clipboard-list"></i> Form Booking</h5>

            <div class="mb-3">
              <label class="form-label">Nama</label>
              <input type="text" id="namaBooking" class="form-control bg-dark text-white border-secondary"
                placeholder="Nama kamu" />
            </div>

            <div class="mb-3">
              <label class="form-label">Pilih Konsol & Ruangan</label>
              <select id="konsolBooking" class="form-select bg-dark text-white border-secondary">
                <option value="PS4 Reguler">PS4 Reguler</option>
                <option value="PS5 Reguler">PS5 Reguler</option>
                <option value="PS5 VIP">PS5 VIP</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Pilih Durasi</label>
              <select id="durasiBooking" class="form-select bg-dark text-white border-secondary">
                <option value="1 Jam">1 Jam</option>
                <option value="2 Jam">2 Jam</option>
                <option value="3 Jam">3 Jam</option>
                <option value="4 Jam">4 Jam</option>
                <option value="5 Jam">5 Jam</option>
              </select>
            </div>

            <a href="https://wa.me/6281234567890?text=Halo%20GameZone%2C%20saya%20ingin%20booking%20PS!"
              class="btn btn-aksen w-100" target="_blank">
              Kirim via WhatsApp
            </a>
          </div>
        </div>

        <!-- Info Kontak -->
        <div class="col-md-4">
          <div class="kartu-konsol text-start"> <h5 class="mb-4 text-center" style="color: var(--warna-aksen);"><i class="fa-solid fa-phone"></i> Kontak Kami</h5>
            <p><i class="fa-solid fa-location-dot text-danger me-2"></i> <strong>Alamat:</strong><br><span class="ms-4">Jl. Gamer No. 12, Jambi</span></p>
            <p><i class="fa-brands fa-whatsapp text-success me-2"></i> <strong>WhatsApp:</strong><br><span class="ms-4">0812-3456-7890</span></p>
            <p><i class="fa-solid fa-clock text-warning me-2"></i> <strong>Jam Buka:</strong><br><span class="ms-4">10.00 - 03.00 WIB</span></p>
          </div>
        </div>

      </div>
    </div>
  </section>
